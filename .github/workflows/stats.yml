name: stat-card
run-name: ${{ github.workflow }} ✅ ${{ github.ref }} ✅ ${{ github.actor }} ✅ ${{ github.event_name}}
on:
  workflow_dispatch:

jobs:

  Card:
    name: Card
    continue-on-error: false
    strategy:
      fail-fast: false
      max-parallel: 3
    runs-on: macos-latest
    permissions: read-all
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      ACCESS_TOKEN: ${{secrets.ACCESS_TOKEN}}
      GITHUB_owner: ${{github.repository_owner}}
      FORCE_COLOR: true
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}

    steps:

    - name: checkout ${{ github.ref }}
      id: checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    - name: node
      id: node
      uses: actions/setup-node@v4
      with:
        node-version: 'latest'

    - name: npm
      id: npm
      run: |
       npm install --save

    - name: update
      id: update
      run: |
       npm run update

    - name: check
      id: check
      run: |
       ls -slh ${{ github.workspace }}/generated
       cat ${{ github.workspace }}/generated/overview.svg
       cat ${{ github.workspace }}/generated/languages.svg

    - name: E-build
      id: esbuild
      run: |
       awk '!/import SVGO from 'svgo';/' ${{ github.workspace }}/updater.js > ./temp && mv ./temp ${{ github.workspace }}/updater.js
       npm run E-build
       rm -r ${{ github.workspace }}/node_modules
       node ./dist/esbuild_updater.js ${{github.repository_owner}} -info
       ls -slh ${{ github.workspace }}/dist
       ls -slh ${{ github.workspace }}/generated
       cat ${{ github.workspace }}/generated/overview.svg
       cat ${{ github.workspace }}/generated/languages.svg