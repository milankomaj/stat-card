name: stat-card
run-name: ${{ github.workflow }} ✅ ${{ github.ref }} ✅ ${{ github.actor }} ✅ ${{ github.event_name}}
on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'
jobs:

  Card:
    name: Card
    continue-on-error: false
    strategy:
      fail-fast: false
      max-parallel: 3
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITHUB_TOKEN: ${{secrets.GITHUB_TOKEN}}
      ACCESS_TOKEN: ${{secrets.ACCESS_TOKEN}}
      GITHUB_owner: ${{github.repository_owner}}
      FORCE_COLOR: true
    defaults:
      run:
        shell: bash
        working-directory: ${{ github.workspace }}
    outputs:
      today: ${{ steps.check.outputs.today }}
      first_day: ${{ steps.check.outputs.first_day_moths }}
      last_day: ${{ steps.check.outputs.last_day_moths }}

    steps:

    - name: checkout ${{ github.ref }}
      id: checkout
      uses: actions/checkout@v4
      with:
        ref: ${{ github.ref }}

    # - run: echo "::add-mask::$GITHUB_owner"

    - name: shell-x@v0.3
      id: locale
      if: ${{ runner.os == 'Linux' }}
      uses: milankomaj/shell-x@v0.3
      with:
        shell: bash
        locale: sk_SK.utf8
        timezone: Europe/Bratislava

    - name: update
      id: update
      run: |
       npm install --save
       npm run update

    - name: check
      id: check
      run: |
       ls -sh ${{ github.workspace }}/generated
       today=$(date +'%Y%m%d')
       first_day_moths=$(date +'%Y%m%d' -d "-0 month -$((10#$(date +%d)-1)) days")
       last_day_moths=$(date +'%Y%m%d' -d "-$(date +%d) days +1 month")
       echo "today=$(echo $today)" >> $GITHUB_OUTPUT
       echo "first_day_moths=$(echo $first_day_moths)" >> $GITHUB_OUTPUT
       echo "last_day_moths=$(echo $last_day_moths)" >> $GITHUB_OUTPUT

    - name: upload to gist
      id: upload
      working-directory: ${{ github.workspace }}/generated
      run: |
       unset GITHUB_TOKEN
       echo ${{secrets.ACCESS_TOKEN}} | gh auth login --with-token
       count=$(gh api gists --jq length)
       echo "gists: " $count
       gh auth status
       gh gist edit 1abcaab647714e8cbaf83f7c6a224378 -f overview.svg overview.svg
       gh gist edit 1abcaab647714e8cbaf83f7c6a224378 -f languages.svg languages.svg
       sum=$(gh api gists/1abcaab647714e8cbaf83f7c6a224378 --jq '.history | map(.change_status.total) | add')
       echo "total: " $sum
       echo "today: "${{ steps.check.outputs.today }}
       echo "first_day_moths: "${{ steps.check.outputs.first_day_moths }}
       echo "last_day_moths: "${{ steps.check.outputs.last_day_moths }}

    - name: E-build & shell-x@v0.3
      id: shell
      if: ${{ runner.os != 'Linux' }}
      uses: milankomaj/shell-x@v0.3
      with:
        shell: bash
        locale: sk_SK.utf8
        timezone: Europe/Bratislava
        comand:
          sed -i '4d' ${{ github.workspace }}/updater.js &&
          npm run E-build &&
          rm -r ${{ github.workspace }}/node_modules &&
          node ./dist/esbuild_updater.js ${{github.repository_owner}} -info &&
          ls -slh ${{ github.workspace }}/dist &&
          ls -slh ${{ github.workspace }}/generated &&
          cat ${{ github.workspace }}/generated/overview.svg &&
          cat ${{ github.workspace }}/generated/languages.svg
